<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="900" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="600" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="#232f3e">
    ECS Production Architecture
  </text>
  
  <!-- Internet/Users -->
  <ellipse cx="600" cy="100" rx="100" ry="40" fill="#e1f5ff" stroke="#0066cc" stroke-width="3"/>
  <text x="600" y="105" font-size="14" font-weight="bold" text-anchor="middle" fill="#0066cc">
    Internet / Users
  </text>
  
  <!-- Arrow from Internet to ALB -->
  <line x1="600" y1="140" x2="600" y2="180" stroke="#0066cc" stroke-width="4" marker-end="url(#arrowblue)"/>
  <text x="620" y="165" font-size="12" fill="#0066cc">HTTP/HTTPS</text>
  
  <!-- VPC Container -->
  <rect x="50" y="200" width="1100" height="650" rx="10" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="3"/>
  <text x="70" y="230" font-size="18" font-weight="bold" fill="#7b1fa2">AWS VPC</text>
  
  <!-- Public Subnet -->
  <rect x="100" y="250" width="1000" height="120" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="120" y="275" font-size="16" font-weight="bold" fill="#2e7d32">Public Subnets (Multi-AZ)</text>
  
  <!-- ALB -->
  <rect x="200" y="290" width="200" height="60" rx="5" fill="#ff9900" stroke="#ff6600" stroke-width="2"/>
  <text x="300" y="310" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">ALB</text>
  <text x="300" y="328" font-size="11" text-anchor="middle" fill="#ffffff">Health Checks</text>
  <text x="300" y="343" font-size="11" text-anchor="middle" fill="#ffffff">Drain: 30s</text>
  
  <!-- NAT Gateway -->
  <rect x="800" y="290" width="200" height="60" rx="5" fill="#4caf50" stroke="#2e7d32" stroke-width="2"/>
  <text x="900" y="315" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">NAT Gateway</text>
  <text x="900" y="335" font-size="11" text-anchor="middle" fill="#ffffff">Multi-AZ</text>
  
  <!-- Private Subnet -->
  <rect x="100" y="400" width="1000" height="400" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="120" y="425" font-size="16" font-weight="bold" fill="#e65100">Private Subnets (Multi-AZ)</text>
  
  <!-- ECS Cluster -->
  <rect x="150" y="450" width="450" height="300" rx="8" fill="#ffecb3" stroke="#f57c00" stroke-width="2"/>
  <text x="170" y="475" font-size="14" font-weight="bold" fill="#f57c00">ECS Cluster (prod-ecs-cluster)</text>
  
  <!-- ECS Service -->
  <rect x="180" y="500" width="390" height="220" rx="5" fill="#ff9900" stroke="#ff6600" stroke-width="2"/>
  <text x="375" y="520" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">ECS Service (nginx-service)</text>
  <text x="375" y="538" font-size="10" text-anchor="middle" fill="#ffffff">Min: 100% | Max: 200% | Circuit Breaker: ON</text>
  
  <!-- Tasks -->
  <rect x="200" y="560" width="80" height="60" rx="4" fill="#2196f3" stroke="#1565c0" stroke-width="2"/>
  <text x="240" y="585" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff">Task 1</text>
  <text x="240" y="602" font-size="10" text-anchor="middle" fill="#ffffff">nginx</text>
  
  <rect x="300" y="560" width="80" height="60" rx="4" fill="#2196f3" stroke="#1565c0" stroke-width="2"/>
  <text x="340" y="585" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff">Task 2</text>
  <text x="340" y="602" font-size="10" text-anchor="middle" fill="#ffffff">nginx</text>
  
  <rect x="400" y="560" width="80" height="60" rx="4" fill="#2196f3" stroke="#1565c0" stroke-width="2"/>
  <text x="440" y="585" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff">Task 3</text>
  <text x="440" y="602" font-size="10" text-anchor="middle" fill="#ffffff">nginx</text>
  
  <rect x="200" y="640" width="80" height="60" rx="4" fill="#2196f3" stroke="#1565c0" stroke-width="2"/>
  <text x="240" y="665" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff">Task 4</text>
  <text x="240" y="682" font-size="10" text-anchor="middle" fill="#ffffff">nginx</text>
  
  <!-- ASG -->
  <rect x="650" y="450" width="400" height="300" rx="8" fill="#ffccbc" stroke="#d84315" stroke-width="2"/>
  <text x="670" y="475" font-size="14" font-weight="bold" fill="#d84315">Auto Scaling Group</text>
  <text x="670" y="493" font-size="11" fill="#d84315">Min: 2 | Max: 10 | On-Demand Base: 2</text>
  
  <!-- EC2 Instances -->
  <rect x="680" y="520" width="90" height="70" rx="4" fill="#ff9900" stroke="#ff6600" stroke-width="2"/>
  <text x="725" y="545" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff">EC2</text>
  <text x="725" y="560" font-size="10" text-anchor="middle" fill="#ffffff">On-Demand</text>
  <text x="725" y="575" font-size="10" text-anchor="middle" fill="#ffffff">AZ-1</text>
  
  <rect x="800" y="520" width="90" height="70" rx="4" fill="#ff9900" stroke="#ff6600" stroke-width="2"/>
  <text x="845" y="545" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff">EC2</text>
  <text x="845" y="560" font-size="10" text-anchor="middle" fill="#ffffff">On-Demand</text>
  <text x="845" y="575" font-size="10" text-anchor="middle" fill="#ffffff">AZ-2</text>
  
  <rect x="920" y="520" width="90" height="70" rx="4" fill="#9c27b0" stroke="#6a1b9a" stroke-width="2"/>
  <text x="965" y="545" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff">EC2</text>
  <text x="965" y="560" font-size="10" text-anchor="middle" fill="#ffffff">Spot</text>
  <text x="965" y="575" font-size="10" text-anchor="middle" fill="#ffffff">AZ-1</text>
  
  <rect x="680" y="620" width="90" height="70" rx="4" fill="#9c27b0" stroke="#6a1b9a" stroke-width="2"/>
  <text x="725" y="645" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff">EC2</text>
  <text x="725" y="660" font-size="10" text-anchor="middle" fill="#ffffff">Spot</text>
  <text x="725" y="675" font-size="10" text-anchor="middle" fill="#ffffff">AZ-2</text>
  
  <!-- Supporting Services -->
  <rect x="150" y="820" width="180" height="60" rx="5" fill="#146eb4" stroke="#0d47a1" stroke-width="2"/>
  <text x="240" y="843" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff">SSM Parameter</text>
  <text x="240" y="860" font-size="10" text-anchor="middle" fill="#ffffff">Store (Secrets)</text>
  
  <rect x="360" y="820" width="180" height="60" rx="5" fill="#146eb4" stroke="#0d47a1" stroke-width="2"/>
  <text x="450" y="843" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff">CloudWatch</text>
  <text x="450" y="860" font-size="10" text-anchor="middle" fill="#ffffff">Logs</text>
  
  <rect x="570" y="820" width="180" height="60" rx="5" fill="#dd344c" stroke="#b71c1c" stroke-width="2"/>
  <text x="660" y="843" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff">IAM Roles</text>
  <text x="660" y="860" font-size="10" text-anchor="middle" fill="#ffffff">Instance/Task</text>
  
  <rect x="780" y="820" width="180" height="60" rx="5" fill="#7aa116" stroke="#558b2f" stroke-width="2"/>
  <text x="870" y="838" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff">Capacity Provider</text>
  <text x="870" y="853" font-size="10" text-anchor="middle" fill="#ffffff">Target: 100%</text>
  <text x="870" y="868" font-size="10" text-anchor="middle" fill="#ffffff">Scales ASG</text>
  
  <!-- Arrows -->
  <line x1="300" y1="350" x2="240" y2="560" stroke="#4caf50" stroke-width="3" marker-end="url(#arrowgreen)"/>
  <line x1="300" y1="350" x2="340" y2="560" stroke="#4caf50" stroke-width="3" marker-end="url(#arrowgreen)"/>
  <line x1="300" y1="350" x2="440" y2="560" stroke="#4caf50" stroke-width="3" marker-end="url(#arrowgreen)"/>
  
  <line x1="240" y1="620" x2="725" y2="590" stroke="#ff9900" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="340" y1="620" x2="845" y2="590" stroke="#ff9900" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="440" y1="620" x2="965" y2="590" stroke="#ff9900" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0066cc"/>
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4caf50"/>
    </marker>
  </defs>
</svg>
